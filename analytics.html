<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - FocusFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#E8725C', light: '#F0A698', dark: '#C45A47' },
            accent: { DEFAULT: '#5CC5E8', light: '#9EDBF0', dark: '#3AA8CF' },
            slate: { 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1', 400: '#94A3B8', 500: '#64748B', 600: '#475569', 700: '#334155', 800: '#1E293B', 850: '#151D2D', 900: '#0F172A', 950: '#020617' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors">
  <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
    <div class="mx-auto max-w-6xl flex items-center justify-between px-4 h-14">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <span class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">FocusFlow</span>
        <nav class="hidden sm:flex items-center gap-1 ml-6">
          <a href="index.html" class="px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Timer</a>
          <a href="history.html" class="px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">History</a>
          <a href="analytics.html" class="px-3 py-1.5 text-sm font-medium text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-950 rounded-md">Analytics</a>
        </nav>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="window.FocusFlow?.DarkMode.toggle()" class="p-2 rounded-lg text-slate-500 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-8">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 animate-fade-in">Analytics</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 animate-fade-in" style="animation-delay: 0.05s;">
      <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Sessions Today</div>
        <div class="text-3xl font-bold text-slate-900 dark:text-white" id="stat-sessions">0</div>
      </div>
      <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Focus Time</div>
        <div class="text-3xl font-bold text-primary" id="stat-focus">0m</div>
      </div>
      <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Current Streak</div>
        <div class="text-3xl font-bold text-accent" id="stat-streak">0 days</div>
      </div>
    </div>
    <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm mb-8 animate-fade-in" style="animation-delay: 0.1s;">
      <div class="flex items-center justify-between p-5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Streak Calendar</h2>
        <div class="flex items-center gap-2">
          <button onclick="navigateMonth(-1)" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <svg class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <span id="calendar-month-label" class="text-sm font-medium text-slate-700 dark:text-slate-300 min-w-[120px] text-center"></span>
          <button onclick="navigateMonth(1)" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <svg class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div class="p-5">
        <div class="grid grid-cols-7 gap-1 mb-2">
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Mon</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Tue</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Wed</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Thu</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Fri</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Sat</div>
          <div class="text-xs font-medium text-slate-500 dark:text-slate-400 text-center py-1">Sun</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        <div class="flex items-center justify-end gap-2 mt-4 text-xs text-slate-500 dark:text-slate-400">
          <span>Less</span>
          <div class="w-4 h-4 rounded bg-slate-100 dark:bg-slate-800"></div>
          <div class="w-4 h-4 rounded bg-primary-light/40"></div>
          <div class="w-4 h-4 rounded bg-primary-light/70"></div>
          <div class="w-4 h-4 rounded bg-primary"></div>
          <span>More</span>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm animate-fade-in" style="animation-delay: 0.15s;">
        <div class="p-5 border-b border-slate-200 dark:border-slate-800">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Weekly Trend</h2>
        </div>
        <div class="p-5">
          <div id="weekly-chart" class="flex items-end justify-between gap-2 h-40">
            <div class="flex-1 flex flex-col items-center justify-end h-full">
              <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md" style="height: 10%"></div>
              <span class="text-xs text-slate-500 dark:text-slate-400 mt-2">Mon</span>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm animate-fade-in" style="animation-delay: 0.2s;">
        <div class="p-5 border-b border-slate-200 dark:border-slate-800">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Motivation</h2>
        </div>
        <div class="p-5 flex flex-col items-center justify-center text-center min-h-[200px]">
          <div class="text-5xl mb-4" id="motivation-emoji">🔥</div>
          <div class="text-xl font-bold text-slate-900 dark:text-white mb-2" id="motivation-title">Keep Going!</div>
          <div class="text-sm text-slate-500 dark:text-slate-400 max-w-xs" id="motivation-message">Start your first focus session to build your streak.</div>
          <a href="index.html" class="mt-4 px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-primary-dark transition-colors">Start Focusing</a>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    const { API, DateTime } = window.FocusFlow;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    async function loadStats() {
      try {
        const today = DateTime.getToday();
        const res = await API.sessions.stats('daily', today);
        if (res.success && res.data) {
          const d = res.data;
          document.getElementById('stat-sessions').textContent = d.work_sessions || 0;
          const mins = Math.round((d.total_focus_seconds || 0) / 60);
          document.getElementById('stat-focus').textContent = mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins}m`;
        }
      } catch (err) { console.error('Stats error:', err); }
    }
    async function loadCalendar() {
      try {
        const res = await API.sessions.calendar(currentYear, currentMonth + 1);
        if (!res.success) return;
        const data = res.data || {};
        const label = new Date(currentYear, currentMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        document.getElementById('calendar-month-label').textContent = label;
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const firstDay = new Date(currentYear, currentMonth, 1);
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let startDay = firstDay.getDay() - 1;
        if (startDay < 0) startDay = 6;
        for (let i = 0; i < startDay; i++) {
          grid.innerHTML += '<div class="w-full aspect-square"></div>';
        }
        const maxSessions = Math.max(...Object.values(data), 1);
        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const count = data[dateStr] || 0;
          const intensity = count === 0 ? 0 : Math.min(Math.ceil((count / maxSessions) * 3), 3);
          const colors = ['bg-slate-100 dark:bg-slate-800', 'bg-primary-light/40', 'bg-primary-light/70', 'bg-primary'];
          const isToday = dateStr === DateTime.getToday();
          const border = isToday ? 'ring-2 ring-primary ring-offset-1 dark:ring-offset-slate-900' : '';
          const el = document.createElement('div');
          el.className = `w-full aspect-square rounded-md ${colors[intensity]} ${border} flex items-center justify-center text-xs font-medium text-slate-700 dark:text-slate-300 hover:scale-110 transition-transform cursor-default`;
          el.title = `${dateStr}: ${count} session${count !== 1 ? 's' : ''}`;
          el.textContent = day;
          grid.appendChild(el);
        }
      } catch (err) { console.error('Calendar error:', err); }
    }
    async function loadWeeklyChart() {
      try {
        const weekDates = [];
        const today = new Date();
        for (let i = 6; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          weekDates.push(d.toISOString().split('T')[0]);
        }
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const counts = [];
        for (const date of weekDates) {
          const res = await API.sessions.stats('daily', date);
          counts.push(res.success ? (res.data.work_sessions || 0) : 0);
        }
        const maxCount = Math.max(...counts, 1);
        const container = document.getElementById('weekly-chart');
        container.innerHTML = '';
        counts.forEach((count, i) => {
          const height = Math.max((count / maxCount) * 100, 5);
          const isToday = i === 6;
          const barColor = isToday ? 'bg-primary' : 'bg-primary-light/60 dark:bg-primary-dark/40';
          const textColor = isToday ? 'text-primary font-bold' : 'text-slate-500 dark:text-slate-400';
          container.innerHTML += `
            <div class="flex-1 flex flex-col items-center justify-end h-full">
              <div class="text-xs ${textColor} mb-1">${count}</div>
              <div class="w-full ${barColor} rounded-t-md transition-all duration-500 hover:opacity-80" style="height: ${height}%"></div>
              <span class="text-xs text-slate-500 dark:text-slate-400 mt-2">${days[i]}</span>
            </div>`;
        });
      } catch (err) { console.error('Weekly chart error:', err); }
    }
    async function calculateStreak() {
      try {
        let streak = 0;
        const today = new Date();
        for (let i = 0; i < 365; i++) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          const dateStr = date.toISOString().split('T')[0];
          const res = await API.sessions.stats('daily', dateStr);
          if (res.success && res.data && res.data.work_sessions > 0) {
            streak++;
          } else if (i > 0) {
            break;
          } else {
            continue;
          }
        }
        document.getElementById('stat-streak').textContent = `${streak} day${streak !== 1 ? 's' : ''}`;
        updateMotivation(streak);
        return streak;
      } catch (err) { console.error('Streak error:', err); }
    }
    function updateMotivation(streak) {
      const emoji = document.getElementById('motivation-emoji');
      const title = document.getElementById('motivation-title');
      const msg = document.getElementById('motivation-message');
      if (streak === 0) {
        emoji.textContent = '💪'; title.textContent = 'Ready to Focus?';
        msg.textContent = 'Start your first session today and build your productivity streak!';
      } else if (streak === 1) {
        emoji.textContent = '🌟'; title.textContent = 'Great Start!';
        msg.textContent = 'You\'ve completed a session today. Keep the momentum going!';
      } else if (streak < 7) {
        emoji.textContent = '🔥'; title.textContent = `${streak}-Day Streak!`;
        msg.textContent = 'You\'re building a solid habit. Consistency is the key to mastery!';
      } else if (streak < 30) {
        emoji.textContent = '⚡'; title.textContent = `${streak}-Day Streak!`;
        msg.textContent = 'Incredible discipline! You\'re transforming your productivity.';
      } else {
        emoji.textContent = '👑'; title.textContent = `${streak}-Day Streak!`;
        msg.textContent = 'Legendary focus! You\'re a productivity master. Keep inspiring!';
      }
    }
    function navigateMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      loadCalendar();
    }
    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      loadCalendar();
      loadWeeklyChart();
      calculateStreak();
    });
  </script>
</body>
</html>
